<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 뷰어</title>
  <link rel="stylesheet" href="vendor/pdfjs/pdf_viewer.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/annotations.css">
  <link rel="stylesheet" href="css/dark-mode.css">
</head>
<body>
  <input type="file" id="file-input" accept=".pdf,application/pdf,image/*">

  <div id="app">
    <!-- ===== TOOLBAR ===== -->
    <div id="toolbar">
      <!-- Sidebar toggle (left-most) -->
      <div class="toolbar-group">
        <button class="toolbar-btn" id="btn-sidebar" title="사이드바 토글">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
          <span class="btn-label">사이드바</span>
        </button>
      </div>

      <div class="toolbar-separator"></div>

      <!-- File + URL -->
      <div class="toolbar-group">
        <button class="toolbar-btn toolbar-btn-text" id="btn-open" title="파일 열기 (Ctrl+O)">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg>
          <span class="btn-label">파일</span>
        </button>
        <button class="toolbar-btn toolbar-btn-text" id="btn-url" title="URL 열기">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
          <span class="btn-label">URL</span>
        </button>
      </div>

      <div class="toolbar-separator"></div>

      <!-- Label toggle -->
      <div class="toolbar-group">
        <button class="toolbar-btn toolbar-btn-text" id="btn-toggle-labels" title="한글 메뉴">
          <span class="btn-icon-text">한</span>
          <span class="btn-label">아이콘</span>
        </button>
      </div>

      <div class="toolbar-separator"></div>

      <!-- Navigation -->
      <div class="toolbar-group">
        <button class="toolbar-btn" id="btn-prev" title="이전 페이지">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
          <span class="btn-label">이전</span>
        </button>
        <input type="number" id="page-input" value="1" min="1">
        <span id="page-total">/ 0</span>
        <button class="toolbar-btn" id="btn-next" title="다음 페이지">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
          <span class="btn-label">다음</span>
        </button>
      </div>

      <div class="toolbar-separator"></div>

      <!-- Zoom -->
      <div class="toolbar-group">
        <button class="toolbar-btn" id="btn-zoom-out" title="축소 (Ctrl+-)">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 13H5v-2h14v2z"/></svg>
          <span class="btn-label">축소</span>
        </button>
        <span id="zoom-level">150%</span>
        <button class="toolbar-btn" id="btn-zoom-in" title="확대 (Ctrl++)">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          <span class="btn-label">확대</span>
        </button>
        <button class="toolbar-btn" id="btn-fit-width" title="너비 맞춤">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M4 18h16v2H4v-2zM4 4h16v2H4V4zm10 7H4v2h10v-2zm4-1v4l4-2-4-2z"/></svg>
          <span class="btn-label">너비맞춤</span>
        </button>
        <button class="toolbar-btn" id="btn-fit-page" title="페이지 맞춤">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M3 5v4h2V5h4V3H5a2 2 0 00-2 2zm2 10H3v4a2 2 0 002 2h4v-2H5v-4zm14 4h-4v2h4a2 2 0 002-2v-4h-2v4zm0-16h-4v2h4v4h2V5a2 2 0 00-2-2z"/></svg>
          <span class="btn-label">페이지맞춤</span>
        </button>
        <button class="toolbar-btn" id="btn-spread" title="2페이지 보기">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M3 5a2 2 0 012-2h4v2H5v14h4v2H5a2 2 0 01-2-2V5zm8-2h4a2 2 0 012 2v2h2a2 2 0 012 2v10a2 2 0 01-2 2h-4v-2h4V9h-2v10a2 2 0 01-2 2h-4V3z"/></svg>
          <span class="btn-label">2페이지</span>
        </button>
        <button class="toolbar-btn" id="btn-comic" title="만화책 보기">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM8 15l5-3-5-3v6z"/></svg>
          <span class="btn-label">만화책</span>
        </button>
      </div>

      <div class="toolbar-separator"></div>

      <!-- Rotate -->
      <div class="toolbar-group">
        <button class="toolbar-btn" id="btn-rotate" title="회전">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
          <span class="btn-label">회전</span>
        </button>
      </div>

      <div class="toolbar-separator"></div>

      <!-- Memo color palette -->
      <div class="toolbar-group" style="position:relative;">
        <button class="toolbar-btn" id="btn-memo-color" title="메모 색상">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 22C6.49 22 2 17.51 2 12S6.49 2 12 2s10 4.04 10 9c0 3.31-2.69 6-6 6h-1.77c-.28 0-.5.22-.5.5 0 .12.05.23.13.33.41.47.64 1.06.64 1.67A2.5 2.5 0 0112 22zm0-18c-4.41 0-8 3.59-8 8s3.59 8 8 8c.28 0 .5-.22.5-.5a.54.54 0 00-.14-.35c-.41-.46-.63-1.05-.63-1.65a2.5 2.5 0 012.5-2.5H16c2.21 0 4-1.79 4-4 0-3.86-3.59-7-8-7z"/><circle fill="currentColor" cx="6.5" cy="11.5" r="1.5"/><circle fill="currentColor" cx="9.5" cy="7.5" r="1.5"/><circle fill="currentColor" cx="14.5" cy="7.5" r="1.5"/><circle fill="currentColor" cx="17.5" cy="11.5" r="1.5"/></svg>
          <span id="memo-color-indicator"></span>
          <span class="btn-label">메모색상</span>
        </button>
        <div id="memo-color-dropdown" class="memo-color-dropdown hidden">
          <div class="memo-color-row">
            <div class="memo-color-swatch" data-color="yellow" title="노랑"></div>
            <div class="memo-color-swatch" data-color="green" title="초록"></div>
            <div class="memo-color-swatch" data-color="blue" title="파랑"></div>
            <div class="memo-color-swatch" data-color="pink" title="분홍"></div>
            <div class="memo-color-swatch" data-color="red" title="빨강"></div>
          </div>
          <div class="memo-color-row">
            <div class="memo-color-swatch outline" data-color="yellow-outline" title="노랑 외곽선"></div>
            <div class="memo-color-swatch outline" data-color="green-outline" title="초록 외곽선"></div>
            <div class="memo-color-swatch outline" data-color="blue-outline" title="파랑 외곽선"></div>
            <div class="memo-color-swatch outline" data-color="pink-outline" title="분홍 외곽선"></div>
            <div class="memo-color-swatch outline" data-color="red-outline" title="빨강 외곽선"></div>
          </div>
        </div>
      </div>

      <!-- Drawing tools: Underline + Box (grouped) -->
      <div class="toolbar-group toolbar-group-annotation" style="position:relative;">
        <button class="toolbar-btn" id="btn-underline" title="밑줄">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 17c3.31 0 6-2.69 6-6V3h-2.5v8c0 1.93-1.57 3.5-3.5 3.5S8.5 12.93 8.5 11V3H6v8c0 3.31 2.69 6 6 6zm-7 2v2h14v-2H5z"/></svg>
          <span id="underline-indicator"></span>
          <span class="btn-label">밑줄</span>
        </button>
        <div id="underline-dropdown" class="underline-dropdown hidden">
          <div class="underline-mode-row">
            <button class="underline-mode-btn active" data-mode="straight" title="직선"><svg viewBox="0 0 24 24" width="16" height="16"><line x1="3" y1="17" x2="21" y2="17" stroke="currentColor" stroke-width="2"/></svg> 직선</button>
            <button class="underline-mode-btn" data-mode="freehand" title="자유선"><svg viewBox="0 0 24 24" width="16" height="16"><path fill="none" stroke="currentColor" stroke-width="2" d="M3 17c3-4 6 2 9-2s6 2 9-2"/></svg> 자유선</button>
          </div>
          <div class="underline-color-label">색상</div>
          <div class="underline-color-row">
            <div class="underline-color-swatch active" data-color="red" title="빨강"></div>
            <div class="underline-color-swatch" data-color="blue" title="파랑"></div>
            <div class="underline-color-swatch" data-color="green" title="초록"></div>
            <div class="underline-color-swatch" data-color="yellow" title="노랑"></div>
            <div class="underline-color-swatch" data-color="pink" title="분홍"></div>
          </div>
          <div class="underline-color-label">두께</div>
          <div class="underline-width-row">
            <button class="underline-width-btn" data-width="1">━</button>
            <button class="underline-width-btn active" data-width="2">━━</button>
            <button class="underline-width-btn" data-width="4">━━━</button>
          </div>
        </div>
        <button class="toolbar-btn" id="btn-box-draw" title="상자 그리기">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          <span class="btn-label">상자그리기</span>
        </button>
        <button class="toolbar-btn" id="btn-box-color" title="상자 색상">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M16.56 8.94L7.62 0 6.21 1.41l2.38 2.38-5.15 5.15a1.49 1.49 0 000 2.12l5.5 5.5c.29.29.68.44 1.06.44s.77-.15 1.06-.44l5.5-5.5c.59-.58.59-1.53 0-2.12zM5.21 10L10 5.21 14.79 10H5.21zM19 11.5s-2 2.17-2 3.5c0 1.1.9 2 2 2s2-.9 2-2c0-1.33-2-3.5-2-3.5z"/></svg>
          <span id="box-color-indicator"></span>
          <span class="btn-label">상자색상</span>
        </button>
        <div id="box-color-dropdown" class="box-color-dropdown hidden">
          <div class="box-color-section">
            <div class="box-color-label">채우기</div>
            <div class="box-color-row">
              <div class="box-color-swatch none-swatch active" data-type="fill" data-color="none" title="없음"><svg viewBox="0 0 24 24" width="14" height="14"><line x1="4" y1="4" x2="20" y2="20" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/></svg></div>
              <div class="box-color-swatch eyedropper-preview hidden" data-type="fill" data-color="" title="스포이드 색상"></div>
              <div class="box-color-swatch" data-type="fill" data-color="yellow" title="노랑"></div>
              <div class="box-color-swatch" data-type="fill" data-color="green" title="초록"></div>
              <div class="box-color-swatch" data-type="fill" data-color="blue" title="파랑"></div>
              <div class="box-color-swatch" data-type="fill" data-color="pink" title="분홍"></div>
              <div class="box-color-swatch" data-type="fill" data-color="red" title="빨강"></div>
            </div>
            <div class="box-opacity-row">
              <span class="box-opacity-label">투명도</span>
              <input type="range" class="box-opacity-slider" data-type="fill" min="0" max="100" value="40">
              <span class="box-opacity-value" data-type="fill">40%</span>
            </div>
          </div>
          <div class="box-color-section">
            <div class="box-color-label">테두리</div>
            <div class="box-color-row">
              <div class="box-color-swatch none-swatch" data-type="border" data-color="none" title="없음"><svg viewBox="0 0 24 24" width="14" height="14"><line x1="4" y1="4" x2="20" y2="20" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/></svg></div>
              <div class="box-color-swatch eyedropper-preview hidden" data-type="border" data-color="" title="스포이드 색상"></div>
              <div class="box-color-swatch active" data-type="border" data-color="blue" title="파랑"></div>
              <div class="box-color-swatch" data-type="border" data-color="green" title="초록"></div>
              <div class="box-color-swatch" data-type="border" data-color="red" title="빨강"></div>
              <div class="box-color-swatch" data-type="border" data-color="pink" title="분홍"></div>
              <div class="box-color-swatch" data-type="border" data-color="yellow" title="노랑"></div>
            </div>
            <div class="box-opacity-row">
              <span class="box-opacity-label">투명도</span>
              <input type="range" class="box-opacity-slider" data-type="border" min="0" max="100" value="90">
              <span class="box-opacity-value" data-type="border">90%</span>
            </div>
          </div>
          <div class="box-color-section">
            <div class="box-eyedropper-row">
              <button class="box-eyedropper-btn" id="btn-box-eyedropper" title="스포이드"><svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M20.71 5.63l-2.34-2.34a1 1 0 00-1.41 0l-3.12 3.12-1.41-1.42-1.42 1.42 1.42 1.41-8.29 8.29V20h3.89l8.29-8.29 1.41 1.42 1.42-1.42-1.42-1.41 3.12-3.12a1 1 0 00-.14-1.55z"/></svg> 스포이드</button>
              <select class="box-eyedropper-target" id="eyedropper-target">
                <option value="fill">채우기</option>
                <option value="border">테두리</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="toolbar-spacer"></div>

      <!-- Right side: Delete, Save, Search, Print, Dark mode -->
      <div class="toolbar-group">
        <button class="toolbar-btn hidden" id="btn-delete-selected" title="선택된 메모 삭제하기">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          <span class="btn-label">선택삭제</span>
        </button>
        <div class="save-btn-wrap" style="position:relative;">
          <button class="toolbar-btn" id="btn-save" title="저장 (Ctrl+S)">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M17 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V7l-4-4zm2 16H5V5h11.17L19 7.83V19zm-7-7c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zM6 6h9v4H6V6z"/></svg>
            <span class="btn-label">저장</span>
          </button>
          <div class="save-dropdown hidden" id="save-dropdown">
            <button class="save-dropdown-item" data-action="save">저장</button>
            <button class="save-dropdown-item" data-action="save-as">다른 이름으로 저장</button>
          </div>
        </div>
        <button class="toolbar-btn" id="btn-search" title="검색 (Ctrl+F)">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <span class="btn-label">검색</span>
        </button>
        <button class="toolbar-btn" id="btn-print" title="인쇄 (Ctrl+P)">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
          <span class="btn-label">인쇄</span>
        </button>
        <button class="toolbar-btn" id="btn-dark-mode" title="다크 모드">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
          <span class="btn-label">다크모드</span>
        </button>
      </div>
    </div>

    <!-- ===== SEARCH BAR ===== -->
    <div id="search-bar" class="hidden">
      <input type="text" id="search-input" placeholder="검색어 입력...">
      <span id="search-count"></span>
      <button class="search-btn" id="search-prev" title="이전 (Shift+Enter)">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
      </button>
      <button class="search-btn" id="search-next" title="다음 (Enter)">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
      </button>
      <button class="search-btn" id="search-close" title="닫기 (Esc)">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>

    <!-- ===== URL BAR ===== -->
    <div id="url-bar" class="hidden">
      <input type="text" id="url-input" placeholder="URL을 입력하세요... (https://...)">
      <button class="search-btn" id="url-go" title="이동">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>
      <button class="search-btn" id="url-close" title="닫기">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>

    <!-- ===== SIDEBAR ===== -->
    <div id="sidebar">
      <div class="sidebar-tabs">
        <button class="sidebar-tab-btn active" data-tab="thumbnails">미리보기</button>
        <button class="sidebar-tab-btn" data-tab="outline">목차</button>
        <button class="sidebar-tab-btn" data-tab="bookmarks">북마크</button>
        <button class="sidebar-tab-btn" data-tab="memos">메모</button>
        <button class="sidebar-tab-btn" data-tab="decorations">꾸밈</button>
        <button class="sidebar-tab-btn" data-tab="capture">캡쳐</button>
        <button class="sidebar-tab-btn" data-tab="emoji">이모티콘</button>
      </div>
      <div id="panel-thumbnails" class="sidebar-panel"></div>
      <div id="panel-outline" class="sidebar-panel hidden"></div>
      <div id="panel-bookmarks" class="sidebar-panel hidden"></div>
      <div id="panel-memos" class="sidebar-panel hidden"></div>
      <div id="panel-decorations" class="sidebar-panel hidden"></div>
      <div id="panel-capture" class="sidebar-panel hidden"></div>
      <div id="panel-emoji" class="sidebar-panel hidden"></div>
      <div class="sidebar-resize-handle"></div>
    </div>

    <!-- ===== VIEWER ===== -->
    <div id="viewer-container">
      <div id="welcome-screen">
        <div class="welcome-border">
          <svg class="welcome-icon" viewBox="0 0 24 24">
            <path fill="currentColor" opacity="0.5" d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"/>
            <path fill="currentColor" opacity="0.3" d="M8 12h8v1H8zM8 14h8v1H8zM8 16h5v1H8z"/>
          </svg>
          <div class="welcome-title">PDF 파일을 여기에 끌어다 놓으세요</div>
